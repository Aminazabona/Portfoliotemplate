<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet-template</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>
    <header>
        <nav>
            <i class="fa-solid fa-bars"></i>
        </nav>
    </header>
    <main>
        <section id="hero" class="hero_section">
           <div class="content-wrapper">
                <h1 class="hero-title">Creative<span>Developer</span></h1>
                <p>I create digital experiences that inspire and engage. With a passion for clean design and innovative solutions, I transform ideas into beautiful, functional realities.</p>
                <div class="stats">
                    <div class="stat-item">
                        <span>150</span>
                        <p>Projects Completed</p>
                    </div>
                    <div class="stat-item">
                        <span>5</span>
                        <p>Years Experience</p>
                    </div>
                    <div class="stat-item">
                        <span>98</span>
                        <p>Happy Clients</p>
                    </div>
                </div>
                <div class="btn">
                    <button class="btn-primary">View my work</button>
                    <button class="btn-secondary">Get In Touch</button>
                </div>
                <div class="social-media">
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>

                </div>
           </div>
           <div class="image-wrapper">
                 <div class="blue-background"></div>
                <img src="./Asset/image/profile-square-1.webp" alt="Eliot johnson">
                
                    <div class="badge badge-top"><i class="fas fa-palette"></i><span>UI/UX Design</span></div>
                    <div class="badge badge-bottom"><i class="fas fa-bolt"></i><span>Creative Ideas</span></div>
                    <div class="badge badge-right"><i class="fas fa-code"></i><span>Development</span></div>
               
               
           </div>
        </section>
    </main>
    <footer></footer>
</body>
</html>
